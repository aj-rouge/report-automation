name: Stock Report Automation

on:
  workflow_dispatch: # Called by external cron service
    inputs:
      force:
        description: "Force run (ignore date/time checks)"
        required: false
        default: "false"

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run stock report
        run: npm start
        env:
          BASELINKER_API_KEY: ${{ secrets.BASELINKER_API_KEY }}
          TENANT_ID: ${{ secrets.TENANT_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          SITE_ID: ${{ secrets.SITE_ID }}
          SITE_NAME: ${{ secrets.SITE_NAME }}
          CUSTOMER_DATA_FOLDER: ${{ secrets.CUSTOMER_DATA_FOLDER }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          FORCE_REPORT: ${{ github.event.inputs.force }}
      - name: Notify on failure
        if: failure()
        run: echo "❌ Stock report job failed. Check logs above."
